backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "projects"
    label: "Projects"
    folder: "_data/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Tech Stack", name: "tech", widget: "list", default: ["PHP", "MySQL"] }
      - { label: "Gradient Color", name: "gradient", widget: "string", default: "from-slate-700 to-slate-800" }
      - { label: "Icon SVG Path", name: "icon", widget: "text" }
      - { label: "Icon Label", name: "iconLabel", widget: "string" }
      - { label: "Live Demo URL", name: "liveLink", widget: "string", required: false }
      - { label: "GitHub URL", name: "githubLink", widget: "string", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }

  - name: "blog"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Featured Image", name: "image", widget: "image", required: false }